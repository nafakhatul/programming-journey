<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background: red;
            position: relative;
            animation: gerak 2s ease;
        }

        @keyframes gerak {
            from {
                left: 20px;
            }

            30% {
                left: 800px;
            }

            to {
                left: 800px;
            }
        }
    </style>

</head>

<body>
    <h1>CSS Animation</h1>
    <div></div>
</body>

</html>

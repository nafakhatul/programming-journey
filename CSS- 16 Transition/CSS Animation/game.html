<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>CSS Only Game</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2c3e50;
            font-family: sans-serif;
            counter-reset: score;
            /* Inisialisasi skor */
        }

        .game-area {
            position: relative;
            width: 80vw;
            height: 80vh;
            background: #34495e;
            border: 4px solid #ecf0f1;
            overflow: hidden;
        }

        /* Tampilan Skor */
        .score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
        }

        .score-board::after {
            content: counter(score);
        }

        /* Target (Lingkaran) */
        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            background: red;
            border-radius: 50%;
            cursor: pointer;
            /* Animasi bergerak */
            animation: move 3s infinite alternate ease-in-out;
        }

        /* Checkbox untuk mendeteksi klik */
        .target-check {
            display: none;
        }

        /* Jika diklik (checked), lingkaran hilang dan skor naik */
        .target-check:checked {
            counter-increment: score;
        }

        .target-check:checked+.target {
            display: none;
        }

        /* Variasi posisi untuk setiap target */
        #t1 {
            top: 10%;
            left: 10%;
            animation-duration: 2.5s;
        }

        #t2 {
            top: 50%;
            left: 60%;
            animation-duration: 3.2s;
        }

        #t3 {
            top: 20%;
            left: 80%;
            animation-duration: 1.8s;
        }

        @keyframes move {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(300px);
            }
        }
    </style>
</head>

<body>

    <div class="game-area">
        <div class="score-board">Skor: </div>

        <input type="checkbox" id="c1" class="target-check">
        <label for="c1" class="target" id="t1"></label>

        <input type="checkbox" id="c2" class="target-check">
        <label for="c2" class="target" id="t2"></label>

        <input type="checkbox" id="c3" class="target-check">
        <label for="c3" class="target" id="t3"></label>
    </div>

</body>

</html>

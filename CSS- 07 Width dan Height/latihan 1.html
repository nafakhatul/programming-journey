<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>latihan 1</title>
    <style>
        .box-pink {
            width: 200px;
            height: 200px;
            background-color: pink;
        }

        .box-blue {
            width: 50%;
            height: 150px;
            background-color: blue;
        }

        .box-chartreuse {
            width: 80vw;
            height: 30vh;
            background-color: chartreuse;
        }
    </style>
</head>

<body>
    <div class="box-pink">
        200px x 200px
    </div>
    <div class="box-blue">
        50% x 150px
    </div>
    <div class="box-chartreuse">
        80vw x 30vh
    </div>
</body>

</html>

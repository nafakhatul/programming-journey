<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUGAS</title>
    <style>
        h1 {
            text-align: center;
            color: palevioletred;
            text-shadow: 2px 2px 3px white(0, 0, 0, 0.8);
        }

        p {
            text-decoration: underline;
            text-transform: lowercase;
        }

        .small {
            font-size: 20px;
            letter-spacing: 25px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <h1 class="text-center">Tugas merubah praktik 3.1 sampai 3.5 sesuai ide dan keinginan
        masing-masing.</h1>
    <p>
        <span class="underline">Ini adalah teks dengan dekorasi garis bawah</span>
    </p>
    <p>
        <span class="lower">TEKS INI DITULIS DENGAN HURUF KAPITAL, TAPI HASILNYA AKAN MENJADI LOWERCASE.
            KARENA CSS YANG
            MENGATURNYA.</span>
    </p>
    <p class="small">Ini adalah teks dengan ukuran kecil</p>
</body>

</html>

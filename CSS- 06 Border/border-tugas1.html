<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik Border 1</title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: #06146e9c;
        }

        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: #6e06068b;
        }

        .double {
            border: 5px double green;
            padding: 10px;
            background-color: #284a1e83;
        }

        .dashed {
            border: 3px dashed orange;
            padding: 10px;
            background-color: #ff9d007f;
        }

        .groove {
            border: 6px groove purple;
            padding: 10px;
            background-color: #63047281;
        }

        .ridge {
            border: 6px ridge brown;
            padding: 10px;
            background-color: #4a1c059e;
        }
    </style>
</head>

<body>
    <h2>Contoh Border CSS</h2>
    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed, ini adalah paragraf tambahan</p>
    <p class="groove">Ini border groove, ini adalah paragraf tambahan</p>
    <p class="ridge">Ini border ridge, ini adalah paragraf tambahan</p>
</body>

</html>

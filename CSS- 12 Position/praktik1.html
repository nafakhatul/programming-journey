<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            position: relative;
            left: 30px;
            top: 20px;
            background-color: lightblue;
            width: 150px;
            height: 150px;
            right: 50px;
            bottom: 40px;
        }

        .box2 {
            position: absolute;
            left: 30px;
            top: 20px;
            background-color: pink;
            width: 150px;
            height: 150px;
            right: 500px;
            bottom: 0px;
        }

        .box3 {
            position: absolute;
            left: 30px;
            top: 20px;
            background-color: rgb(176, 246, 176);
            width: 150px;
            height: 150px;
            right: 500px;
            bottom: 0px;
        }
    </style>
</head>

<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selektor dalam HTML</title>
    <style>
        /* Selector Tag */
        p {
            color: blue;
        }

        /* Selektor Kelas */
        .highlig {
            background-color: yellow;
        }

        /* Selektor ID */
        #unique-section {
            border: 2px solid red;
            padding: 10px;
        }

        /* Selektor Atribut */
        a[href] {
            text-decoration: none;
            color: green;
        }

        /* Sektor Universal */
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body>
    <h1>Contoh Penggunaan Selektor dalam HTML</h1>
    <!-- Selektor Tag -->
    <p>Ini adalah paragraf yang menggunakan selektor tag &lt;p&gt;.</p>
    <!-- Selektor Kelas -->
    <div class="highlight">Ini adalah paragraf dengan kelas "highlight".</div>
    <!-- Selektor ID -->
    <div id="unique-section">
        <p>Ini adalah paragraf dalam div dengan ID "uniquesection".</p>
    </div>
    <!-- Selektor Atribut -->
    <a href="https://www.example.com" target="_blank">Link dengan atrbut href</a>
    <!-- Selektor Universal -->
    <p>Paragraf ini menggunakan selektor universal.</p>
</body>

</html>
